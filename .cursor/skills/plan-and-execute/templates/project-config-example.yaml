# Example project-config.yaml for plan-and-execute
# Save to: ${PROJECT_ROOT}/.claude/project-config.yaml
#
# All values are optional -- skill defaults apply for anything not specified.
# Invocation-time parameters override these values.

plan-and-execute:
  # --- Project structure ---
  PROJECT_ROOT: "."                              # "." if CWD is already root, or "my-app" for monorepo
  # MODULE_NAME: "auth"                          # Uncomment if you always work on one module

  # --- Commands (uv required) ---
  TEST_CMD: "uv run pytest"
  LINT_CMD: "uv run ruff check ."
  SECURITY_CMD: "uv run bandit -r . -ll"

  # --- Test markers ---
  INTEGRATION_MARKERS: "-m integration"          # pytest markers for integration tests

  # --- Review & policy files ---
  REVIEW_STANDARDS: "docs/review-standards.md"   # Copy from templates/review-standards-template.md
  ENV_CONFIG_POLICY: "docs/env-config-policy.md" # Copy from templates/env-config-policy-template.md
  DOMAIN_REVIEWER: "domain-reviewer"             # Default-on. Set to "none" to disable domain reviewer.

  # --- Planning ---
  PLAN_DIR: "docs/plans"
  # CONSTITUTION: ".specify/memory/constitution.md"  # Uncomment if using speckit constitution

  # --- Logging ---
  # Set during install.sh interactive setup. Drives logging_config.py generation
  # and code-quality review enforcement. Omit entire section to skip logging setup.
  #
  # logging:
  #   destination: "file"                         # "terminal" | "file" | "both"
  #   file_path: "logs/app.log"                   # Relative to PROJECT_ROOT (used when destination includes file)
  #   rotation: "size"                            # "size" | "time" | "none"
  #   max_size_mb: 10                             # Max file size before rotation (rotation=size only)
  #   backup_count: 5                             # Number of rotated files to keep
  #   format: "structured"                        # "structured" (JSON) | "human"
  #   level: "INFO"                               # "DEBUG" | "INFO" | "WARNING" | "ERROR"

  # --- Behavior ---
  SCAN_MODE: "docs"                              # "docs" or "full"
  CONCEPT_MODE: "ask"                            # "ask" or "skip"
  DOC_TASK_MODE: "auto"                          # "auto" or "skip"

  # --- New plug points (FR-1 through FR-7) ---
  STATE_FILE: ".plan-and-execute.state.json"     # FR-1: phase guard state file (relative to CONTEXT_DIR)
  PLAN_ANALYSER: "general-purpose"               # FR-2: subagent type for Phase 3 critic; "none" = inline fallback
  REVIEW_PREAMBLE: ".claude/shared/review-preamble.md"  # FR-3: pre-review posture file; omit to disable
  PROMOTION_THRESHOLD: 3                         # FR-6: min occurrences to recommend promotion
  SEVERITY_OVERRIDE_PROMOTION: ["critical"]      # FR-6: severities that recommend promote at 1 occurrence
  PROMOTION_GATE_MODE: "interactive"             # FR-6: "interactive" (default) | "headless" (CI/Codex/parent-skill)

  # --- v2 plug points (FR-8 through FR-13) ---
  DEFECTS_FILE: ".claude/defects.jsonl"          # FR-13/JSON: append-only RCA ledger (commit to git)
  POLICIES_FILE: ".claude/policies.json"         # FR-13/JSON: active policy registry (commit to git)
  VALIDATORS: []                                 # FR-13: validator skills after each task's code quality gate
                                                 # Built-ins (all off by default): wiring-auditor, contract-auditor,
                                                 # failure-path-auditor, mutation-site-auditor, evidence-verifier
                                                 # Project validators: .claude/validators/<name>/SKILL.md

# --- Review context map (concept, not a new config key) ---------------------
# The keys above form an ordered loading chain that every reviewer subagent walks:
#
#   REVIEW_PREAMBLE  ->  REVIEW_STANDARDS  ->  ENV_CONFIG_POLICY  ->  DEFECTS_FILE digest
#   (posture+loader)     (canonical rules)    (env/config policy)    (role-filtered patterns)
#
# - REVIEW_PREAMBLE is the entry point: a thin (<=80-line) pointer file that
#   orchestrates the subsequent reads. If REVIEW_PREAMBLE is unset or missing,
#   reviewers fall back to reading REVIEW_STANDARDS directly and log the fallback.
# - REVIEW_STANDARDS is the canonical rule catalog (section 6 defines the output contract).
# - ENV_CONFIG_POLICY is loaded only if it exists.
# - DEFECTS_FILE patterns are compiled into a role-filtered digest via the
#   review-context-compiler skill, then injected into the reviewer prompt above the
#   preamble-read instruction. POLICIES_FILE is orchestrator-side only; it is NOT
#   injected into reviewer subagents (promoted rules land in REVIEW_STANDARDS).
#
# DOMAIN_REVIEWER names the review agent (default-on); "none" disables it.
#
# For the non-duplication charter (what content belongs in preamble vs standards vs
# CLAUDE.md Agent Dispatch Discipline), see HELP.md section "Review Artifact Contract"
# -> "Rule-content boundaries".
